<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>
  
  <!-- Border -->
  <rect x="24" y="24" width="1152" height="582" rx="12" stroke="#18181B" stroke-width="3"/>
  
  <!-- Content Container -->
  <g transform="translate(100, 160)">
    <!-- Logo Text -->
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="96" font-weight="700" letter-spacing="-2">
      <tspan fill="#18181B">Doc</tspan>
      <tspan fill="#3B82F6">Ingest</tspan>
