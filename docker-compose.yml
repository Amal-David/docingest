services:
  redis:
    image: redis:7-alpine
    container_name: docingest-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - docingest-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: docingest-redis-ui
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - docingest-network

volumes:
  redis_data:
    driver: local

networks:
  docingest-network:
    driver: bridge
